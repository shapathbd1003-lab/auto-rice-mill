name: Deploy V2 to GitHub Pages

on:
  push:
    branches: [tally-erp-v2]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          cd web-v2
          npm install
          VITE_API_URL=https://backend-production-1b9e.up.railway.app npx vite build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web-v2/dist
          publish_branch: gh-pages
