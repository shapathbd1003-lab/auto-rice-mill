name: Deploy V2 to GitHub Pages

on:
  push:
    branches: [tally-erp-v2]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: web-v2
        run: npm install

      - name: Build
        working-directory: web-v2
        env:
          VITE_API_URL: https://backend-production-1b9e.up.railway.app
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-v2/dist

      - uses: actions/deploy-pages@v4
        id: deployment
