version: '3.9'

# Dev-only compose — starts PostgreSQL only.
# Run backend and web natively with npm run dev.
#
# Usage:
#   docker compose -f docker/docker-compose.dev.yml up -d
#   cd backend && npm run dev
#   cd web     && npm run dev

services:
  db:
    image: postgres:16-alpine
    container_name: ricemill_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: rice_mill
      POSTGRES_USER: ricemill
      POSTGRES_PASSWORD: RiceMill@2024
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ../backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ricemill -d rice_mill"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
    driver: local
